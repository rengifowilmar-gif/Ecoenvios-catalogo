name: Actualizador Diario de Catálogo D1

on:
  schedule:
    # Se ejecuta todos los días a las 10:00 UTC (Ej: 5:00 AM hora de Colombia/Perú)
    # Puedes cambiar los números usando la sintaxis Cron (minuto hora día mes día_semana)
    - cron: '0 10 * * *'
  
  # Esta opción te permite ejecutar el bot manualmente desde la página de GitHub
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # Soluciona la advertencia de Node.js 20 forzando la versión 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # IMPORTANTE: Permiso necesario para que el bot pueda guardar los cambios en products.json
    permissions:
      contents: write

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Acelera futuras ejecuciones

      - name: Instalar dependencias necesarias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Ejecutar el Scraper
        run: python scraper.py

      - name: Guardar y subir cambios a GitHub (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add products.json
          if ! git diff --staged --quiet; then
            git commit -m "Actualización automática del catálogo"
            git push
          else
            echo "No hubo cambios en el catálogo hoy."
          fi